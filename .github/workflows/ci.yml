name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test?sslmode=disable
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/test?sslmode=disable
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZmFrZQ
      CLERK_SECRET_KEY: sk_test_fake
      GEMINI_API_KEY: fake
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
